<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kanban Board</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>

    <!-- Custom drag ghost (hidden, cloned into view on dragstart) -->
    <div class="drag-ghost" id="dragGhost" aria-hidden="true"></div>

    <div class="container">
      <h1>Kanban Board</h1>

      <div class="board" role="main">

        <!-- LIST 1 -->
        <div
          class="list"
          id="list1"
          role="region"
          aria-label="To Do column"
          data-label="To Do"
        >
          <div class="list-header">
            <h2>To Do</h2>
            <span class="card-count" aria-live="polite">2</span>
          </div>
          <div class="cards-area" id="area1">
            <div class="card" draggable="true" id="card1" role="listitem" tabindex="0" aria-grabbed="false" aria-label="Wash Dishes. Press Space to pick up.">Wash Dishes</div>
            <div class="card" draggable="true" id="card2" role="listitem" tabindex="0" aria-grabbed="false" aria-label="Buy Groceries. Press Space to pick up.">Buy Groceries</div>
          </div>
        </div>

        <!-- LIST 2 -->
        <div
          class="list"
          id="list2"
          role="region"
          aria-label="In Progress column"
          data-label="In Progress"
        >
          <div class="list-header">
            <h2>In Progress</h2>
            <span class="card-count" aria-live="polite">1</span>
          </div>
          <div class="cards-area" id="area2">
            <div class="card" draggable="true" id="card3" role="listitem" tabindex="0" aria-grabbed="false" aria-label="Learn to code. Press Space to pick up.">Learn to code</div>
          </div>
        </div>

        <!-- LIST 3 -->
        <div
          class="list"
          id="list3"
          role="region"
          aria-label="Done column"
          data-label="Done"
        >
          <div class="list-header">
            <h2>Done</h2>
            <span class="card-count" aria-live="polite">0</span>
          </div>
          <div class="cards-area" id="area3">
          </div>
        </div>

      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
