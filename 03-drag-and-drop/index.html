<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kanban Board</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>

    <!-- Custom drag ghost (hidden, cloned into view on dragstart) -->
    <div class="drag-ghost" id="dragGhost" aria-hidden="true"></div>

    <!-- Toast notification for constraint feedback & persistence events -->
    <div class="toast" id="toast" role="status" aria-live="polite" aria-atomic="true"></div>

    <!-- Screen-reader live region for keyboard drag announcements (Tier 3 A11Y) -->
    <div id="a11yAnnounce" class="sr-only" role="log" aria-live="assertive" aria-atomic="true"></div>

    <!-- Undo bar (Tier 3) -->
    <div class="undo-bar" id="undoBar" aria-live="polite">
      <span id="undoMsg">Card moved</span>
      <span class="undo-sep"></span>
      <button id="undoBtn" aria-label="Undo last card move">Undo</button>
    </div>

    <div class="container">
      <h1>Kanban Board</h1>

      <div class="board" role="main">

        <!-- LIST 1: To Do — accepts cards from any column -->
        <div
          class="list"
          id="list1"
          role="region"
          aria-label="To Do column"
          data-label="To Do"
          data-allowed-from="list1,list2,list3"
        >
          <div class="list-header">
            <h2>To Do</h2>
            <span class="card-count" aria-live="polite">2</span>
          </div>
          <div class="cards-area" id="area1">
            <div class="card" draggable="true" id="card1" role="listitem" tabindex="0" aria-grabbed="false" aria-label="Wash Dishes. Press Space to pick up.">Wash Dishes</div>
            <div class="card" draggable="true" id="card2" role="listitem" tabindex="0" aria-grabbed="false" aria-label="Buy Groceries. Press Space to pick up.">Buy Groceries</div>
          </div>
        </div>

        <!-- LIST 2: In Progress — accepts cards from any column -->
        <div
          class="list"
          id="list2"
          role="region"
          aria-label="In Progress column"
          data-label="In Progress"
          data-allowed-from="list1,list2,list3"
        >
          <div class="list-header">
            <h2>In Progress</h2>
            <span class="card-count" aria-live="polite">1</span>
          </div>
          <div class="cards-area" id="area2">
            <div class="card" draggable="true" id="card3" role="listitem" tabindex="0" aria-grabbed="false" aria-label="Learn to code. Press Space to pick up.">Learn to code</div>
          </div>
        </div>

        <!-- LIST 3: Done — accepts cards from any column -->
        <div
          class="list"
          id="list3"
          role="region"
          aria-label="Done column"
          data-label="Done"
          data-allowed-from="list1,list2,list3"
        >
          <div class="list-header">
            <h2>Done</h2>
            <span class="card-count" aria-live="polite">0</span>
          </div>
          <div class="cards-area" id="area3">
          </div>
        </div>

      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
