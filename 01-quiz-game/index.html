<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QUIZ ZONE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">

      <!-- ===== SCREEN 1: START ===== -->
      <div class="screen active" id="start-screen">

        <!-- Theme toggle: bulb-shaped dark/light switcher -->
        <button class="theme-toggle" id="theme-toggle" title="Toggle Noir Mode" aria-label="Toggle dark/noir mode">
          <span class="bulb-icon">
            <!-- SVG bulb -->
            <svg viewBox="0 0 32 40" xmlns="http://www.w3.org/2000/svg" class="bulb-svg">
              <!-- bulb glass -->
              <path class="bulb-glass" d="M16 2 C9 2 4 7.5 4 14 C4 18.5 6.5 22.5 10 25 L10 30 L22 30 L22 25 C25.5 22.5 28 18.5 28 14 C28 7.5 23 2 16 2Z"/>
              <!-- filament -->
              <path class="bulb-filament" d="M13 20 L13 17 L16 14 L19 17 L19 20" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              <!-- base segments -->
              <rect class="bulb-base" x="10" y="30" width="12" height="3" rx="0"/>
              <rect class="bulb-base" x="11" y="33" width="10" height="3" rx="0"/>
              <rect class="bulb-base" x="12" y="36" width="8" height="2" rx="0"/>
            </svg>
          </span>
          <span class="theme-toggle-label" id="theme-label">NOIR</span>
        </button>

        <div class="start-badge">READY?</div>
        <h1 class="start-title">QUIZ<br />ZONE</h1>
        <p class="start-subtitle">Test your brain. Beat your best.</p>

        <!-- Config: Category -->
        <div class="config-block">
          <label class="config-label" for="category-select">CATEGORY</label>
          <select id="category-select" class="nb-select">
            <option value="all">🎲 All Mix</option>
            <option value="geography">🌍 Geography</option>
            <option value="science">🔬 Science</option>
            <option value="popCulture">🎬 Pop Culture</option>
            <option value="tech">💻 Tech</option>
          </select>
        </div>

        <!-- Config: Difficulty -->
        <div class="config-block">
          <label class="config-label" for="difficulty-select">DIFFICULTY</label>
          <select id="difficulty-select" class="nb-select">
            <option value="all">ALL LEVELS</option>
            <option value="easy">EASY (70/25/5)</option>
            <option value="medium">MEDIUM (30/50/20)</option>
            <option value="hard">HARD (10/30/60)</option>
          </select>
        </div>

        <!-- TIMER toggle (kept as standard toggle, below the icon controls) -->
        <div class="timer-toggle-row">
          <div class="toggle-item">
            <span class="toggle-label">TIMER</span>
            <label class="nb-toggle">
              <input type="checkbox" id="timer-toggle" checked />
              <span class="toggle-track"></span>
            </label>
          </div>
        </div>

        <!-- Floating icon controls: Sound + Blind -->
        <div class="floating-controls-row">
          <!-- Sound icon button -->
          <button class="float-ctrl-btn" id="sound-ctrl" title="Toggle Sound" aria-label="Toggle sound" data-active="true">
            <svg class="ctrl-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <!-- speaker body -->
              <polygon points="3,9 3,15 7,15 13,20 13,4 7,9" class="icon-fill" stroke-linejoin="round"/>
              <!-- sound waves (shown when active) -->
              <g class="sound-waves">
                <path d="M16 8.5 C17.5 10 17.5 14 16 15.5" fill="none" stroke-linecap="round" stroke-width="1.8"/>
                <path d="M18.5 6 C21 8.5 21 15.5 18.5 18" fill="none" stroke-linecap="round" stroke-width="1.8"/>
              </g>
              <!-- mute X (shown when inactive) -->
              <g class="mute-x" style="display:none;">
                <line x1="16" y1="8" x2="22" y2="14" stroke-linecap="round" stroke-width="2"/>
                <line x1="22" y1="8" x2="16" y2="14" stroke-linecap="round" stroke-width="2"/>
              </g>
            </svg>
            <span class="float-ctrl-label">SFX</span>
          </button>

          <!-- Blind mode icon button -->
          <button class="float-ctrl-btn" id="blind-ctrl" title="Toggle Blind Mode" aria-label="Toggle blind mode" data-active="false">
            <svg class="ctrl-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <!-- eye shape (shown when blind=OFF, eye visible) -->
              <g class="eye-open">
                <path d="M1 12 C4 6 8 3 12 3 C16 3 20 6 23 12 C20 18 16 21 12 21 C8 21 4 18 1 12Z" class="icon-stroke-only" fill="none" stroke-width="1.8"/>
                <circle cx="12" cy="12" r="3.5" class="icon-fill"/>
              </g>
              <!-- slash line (shown when blind=ON) -->
              <line class="blind-slash" x1="3" y1="3" x2="21" y2="21" stroke-linecap="round" stroke-width="2.2" style="display:none;"/>
            </svg>
            <span class="float-ctrl-label">BLIND</span>
          </button>
        </div>

        <!-- Personal best display -->
        <div class="personal-best" id="personal-best">
          <span class="pb-label">PERSONAL BEST</span>
          <span class="pb-score" id="pb-score">—</span>
        </div>

        <button id="start-btn" class="nb-btn primary">START QUIZ</button>
      </div>

      <!-- ===== SCREEN 2: QUIZ ===== -->
      <div class="screen" id="quiz-screen">

        <!-- Top HUD bar -->
        <div class="quiz-hud">
          <div class="hud-block">
            <span class="hud-label">QUESTION</span>
            <span class="hud-value">
              <span id="current-question">1</span>/<span id="total-questions">10</span>
            </span>
          </div>
          <div class="hud-block" id="combo-block" style="display:none;">
            <span class="hud-label">COMBO</span>
            <span class="hud-value combo-value" id="combo-display">×1</span>
          </div>
          <div class="hud-block">
            <span class="hud-label">SCORE</span>
            <span class="hud-value" id="score">0</span>
          </div>
        </div>

        <!-- Arcade Combo Timer Bar -->
        <div class="combo-timer-wrap" id="timer-bar-wrap">
          <!-- Left: Combo multiplier tag -->
          <div class="combo-tag" id="combo-tag">
            <span class="combo-tag-text" id="combo-tag-text">COMBO : ×1.0</span>
          </div>
          <!-- Center: the fill bar -->
          <div class="timer-bar" id="timer-bar">
            <div class="timer-fill" id="timer-fill"></div>
          </div>
          <!-- Right: Digital stopwatch -->
          <div class="stopwatch" id="stopwatch">
            <span class="stopwatch-val" id="stopwatch-val">15<span class="stopwatch-ms">.00</span></span>
          </div>
        </div>

        <!-- Question card -->
        <div class="question-card" id="question-card">
          <div class="question-difficulty-tag" id="question-difficulty-tag">EASY</div>
          <h2 id="question-text">Question goes here</h2>
          <div class="keyboard-hint">Press 1–4 to answer</div>
        </div>

        <!-- Answers -->
        <div id="answers-container" class="answers-container"></div>

        <!-- Lifeline row -->
        <div class="lifeline-row">
          <button class="nb-btn lifeline-btn" id="lifeline-btn" title="Remove 2 wrong answers — costs half max points">
            <span class="lifeline-icon">½</span>
            <span class="lifeline-text">50/50</span>
            <!-- Cost indicator -->
            <span class="lifeline-cost" id="lifeline-cost">
              <svg viewBox="0 0 20 20" class="coin-icon">
                <circle cx="10" cy="10" r="8" class="coin-body"/>
                <text x="10" y="14" text-anchor="middle" class="coin-text">¢</text>
              </svg>
              <span>−50%</span>
            </span>
          </button>
          <div class="bonus-float" id="bonus-float"></div>
        </div>

        <!-- Progress bar -->
        <div class="progress-bar">
          <div id="progress" class="progress"></div>
        </div>
      </div>

      <!-- ===== SCREEN 3: RESULT ===== -->
      <div id="result-screen" class="screen">
        <h2 class="result-header">RESULTS</h2>

        <!-- Raw score stamp — no /10 denominator -->
        <div class="score-stamp-wrap">
          <div class="score-stamp" id="score-stamp">
            <span class="score-stamp-label">SCORE</span>
            <span id="final-score">0</span>
            <!-- Hidden max-score span for JS compatibility, not displayed -->
            <span id="max-score" style="display:none;">10</span>
          </div>
        </div>

        <!-- New high score badge -->
        <div class="new-best-badge" id="new-best-badge" style="display:none;">
          🏆 NEW BEST!
        </div>

        <div id="result-message" class="result-message">GOOD JOB!</div>

        <div class="result-stats">
          <div class="stat-pill">
            <span class="stat-pill-label">STREAK</span>
            <span class="stat-pill-val" id="result-streak">0</span>
          </div>
          <div class="stat-pill">
            <span class="stat-pill-label">MAX COMBO</span>
            <span class="stat-pill-val" id="result-max-combo">×1</span>
          </div>
          <div class="stat-pill">
            <span class="stat-pill-label">TIME LEFT</span>
            <span class="stat-pill-val" id="result-time">—</span>
          </div>
        </div>

        <div class="result-actions">
          <button id="review-btn" class="nb-btn secondary">REVIEW ANSWERS</button>
          <button id="restart-btn" class="nb-btn primary">PLAY AGAIN</button>
        </div>
      </div>

      <!-- ===== SCREEN 4: REVIEW ===== -->
      <div id="review-screen" class="screen">
        <h2 class="result-header">ANSWER REVIEW</h2>
        <div id="review-list" class="review-list"></div>
        <button id="back-to-result-btn" class="nb-btn primary">BACK</button>
      </div>

    </div><!-- end .container -->

    <script src="script.js"></script>
  </body>
</html>
