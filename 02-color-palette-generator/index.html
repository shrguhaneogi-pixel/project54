<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Palette — Color Theory Generator</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
      integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>

    <!-- ── APP SHELL ── -->
    <div class="app">

      <!-- HEADER -->
      <header class="header">
        <div class="header-left">
          <div class="logo-mark">
            <span class="logo-dot" style="background:#e74c3c"></span>
            <span class="logo-dot" style="background:#f39c12"></span>
            <span class="logo-dot" style="background:#2ecc71"></span>
          </div>
          <h1 class="app-title">Palette</h1>
        </div>
        <div class="header-right">
          <!-- View Mode Toggle (Solid / Gradient) -->
          <div class="mode-toggle" title="Toggle view">
            <button class="mode-btn active" id="mode-solid" data-mode="solid">
              <i class="fas fa-th-large"></i>
              <span>Solid</span>
            </button>
            <button class="mode-btn" id="mode-gradient" data-mode="gradient">
              <i class="fas fa-sliders-h"></i>
              <span>Gradient</span>
            </button>
          </div>
          <!-- Theme Toggle -->
          <button class="icon-btn" id="theme-btn" title="Toggle dark mode">
            <i class="fas fa-moon" id="theme-icon"></i>
          </button>
          <!-- Share Button -->
          <button class="icon-btn" id="share-btn" title="Share palette (copy URL)">
            <i class="fas fa-link"></i>
          </button>
        </div>
      </header>

      <!-- CONTROLS BAR -->
      <div class="controls-bar">
        <div class="harmony-selector">
          <span class="controls-label">Harmony</span>
          <div class="harmony-pills">
            <button class="pill active" data-harmony="analogous">Analogous</button>
            <button class="pill" data-harmony="complementary">Complementary</button>
            <button class="pill" data-harmony="triadic">Triadic</button>
            <button class="pill" data-harmony="monochromatic">Monochromatic</button>
            <button class="pill" data-harmony="split">Split-Comp</button>
          </div>
        </div>
        <div class="a11y-toggle-wrap">
          <label class="toggle-label" for="a11y-toggle">
            <i class="fas fa-eye"></i>
            <span>Contrast</span>
          </label>
          <label class="switch">
            <input type="checkbox" id="a11y-toggle" />
            <span class="switch-track"></span>
          </label>
        </div>
      </div>

      <!-- PALETTE AREA -->
      <main class="palette-wrapper" id="palette-wrapper">

        <!-- SOLID VIEW -->
        <div class="palette-container" id="palette-container">
          <!-- color boxes injected by JS -->
        </div>

        <!-- GRADIENT VIEW -->
        <div class="gradient-container hidden" id="gradient-container">
          <div class="gradient-preview" id="gradient-preview"></div>
          <div class="gradient-stops" id="gradient-stops"></div>
          <div class="gradient-css-output">
            <span class="gradient-css-label">CSS</span>
            <code id="gradient-css-code"></code>
            <button class="copy-css-btn" id="copy-css-btn" title="Copy CSS">
              <i class="far fa-copy"></i>
            </button>
          </div>
        </div>

      </main>

      <!-- GENERATE BUTTON + KEYBOARD HINTS -->
      <div class="generate-wrap">
        <button id="generate-btn">
          <i class="fas fa-sync-alt"></i>
          Generate Palette
          <span class="kbd-hint">Space</span>
        </button>
      </div>

      <!-- KEYBOARD SHORTCUT LEGEND -->
      <div class="kbd-legend" id="kbd-legend">
        <span class="kbd-item"><kbd>Space</kbd> Generate</span>
        <span class="kbd-item"><kbd>←</kbd><kbd>→</kbd> Navigate</span>
        <span class="kbd-item"><kbd>L</kbd> Lock</span>
        <span class="kbd-item"><kbd>C</kbd> Copy</span>
        <span class="kbd-item"><kbd>D</kbd> Dark mode</span>
      </div>

      <!-- DRAG DROP HINT (shown briefly on first use) -->
      <div class="dnd-hint hidden" id="dnd-hint">
        <i class="fas fa-arrows-alt"></i> Drag to reorder
      </div>

      <!-- TOAST -->
      <div class="toast" id="toast"></div>

    </div><!-- /.app -->

    <script src="script.js"></script>
  </body>
</html>
